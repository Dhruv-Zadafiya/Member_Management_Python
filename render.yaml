services:
  - type: web
    name: member-management
    runtime: python
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: cd backend && gunicorn app:app --bind 0.0.0.0:$PORT --workers 4 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.6
      - key: SECRET_KEY
        generateValue: true
      - key: MONGO_URI
        sync: false
