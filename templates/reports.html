{% extends "base.html" %}

{% block content %}
<div class="row mb-4">
    <div class="col-12">
        <div class="card shadow-sm border-0 rounded-4">
            <div class="card-header bg-white border-bottom-0 pt-4">
                <h5 class="fw-bold text-primary"><i class="bi bi-file-earmark-bar-graph me-2"></i>Reports & Exports</h5>
            </div>
            <div class="card-body">
                <p class="text-muted mb-4">Download data for daily or monthly entries here. Currently, you can export the full data to Excel.</p>
                
                <div class="d-flex gap-3">
                    <a href="{{ url_for('export_excel') }}" class="btn btn-success fw-bold px-4 shadow-sm">
                        <i class="bi bi-file-earmark-excel me-2"></i>Export to Excel
                    </a>
                    
                    <a href="{{ url_for('export_pdf') }}" class="btn btn-danger fw-bold px-4 shadow-sm">
                        <i class="bi bi-file-earmark-pdf me-2"></i>Export to PDF
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
