{% extends "base.html" %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-brand">
        <i class="bi bi-people-fill"></i> Member Management
    </div>
    <div class="col-md-6 col-lg-5 col-xl-4">
        <div class="card modern-card p-2 p-md-4">
            <div class="card-body">
                <div class="text-center mb-4">
                    <i class="bi bi-person-plus-fill text-primary mb-3" style="font-size: 4rem;"></i>
                    <h3 class="fw-bold mt-2">Create Account</h3>
                    <p class="text-muted">Sign up to get started</p>
                </div>
                
                <form action="{{ url_for('signup') }}" method="POST">
                    <div class="mb-3 modern-input">
                        <label for="name" class="form-label fw-semibold">Full Name</label>
                        <div class="input-group">
                            <span class="input-group-text border-end-0"><i class="bi bi-card-text"></i></span>
                            <input type="text" class="form-control border-start-0" id="name" name="name" required placeholder="Enter your full name">
                        </div>
                    </div>
                    <div class="mb-3 modern-input">
                        <label for="username" class="form-label fw-semibold">Username</label>
                        <div class="input-group">
                            <span class="input-group-text border-end-0"><i class="bi bi-person"></i></span>
                            <input type="text" class="form-control border-start-0" id="username" name="username" required placeholder="Choose a username">
                        </div>
                    </div>
                    <div class="mb-4 modern-input">
                        <label for="password" class="form-label fw-semibold">Password</label>
                        <div class="input-group">
                            <span class="input-group-text border-end-0"><i class="bi bi-lock"></i></span>
                            <input type="password" class="form-control border-start-0" id="password" name="password" required placeholder="Create a password">
                        </div>
                    </div>
                    <button type="submit" class="btn modern-btn w-100 py-3 fw-bold shadow-sm rounded-3">Sign Up</button>
                    
                    <div class="mt-4 text-center">
                        <p class="mb-0 text-muted">Already have an account? <a href="{{ url_for('login') }}" class="text-decoration-none fw-semibold">Sign In</a></p>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
