{% extends "base.html" %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-brand">
        <i class="bi bi-people-fill"></i> Member Management
    </div>
    <div class="col-md-6 col-lg-5 col-xl-4">
        <div class="card modern-card p-2 p-md-4">
            <div class="card-body">
                <div class="text-center mb-4">
                    <i class="bi bi-person-circle text-primary mb-3" style="font-size: 4rem;"></i>
                    <h3 class="fw-bold mt-2">Welcome Back</h3>
                    <p class="text-muted">Please sign in to your account</p>
                </div>
                
                <form action="{{ url_for('login') }}" method="POST">
                    <div class="mb-3 modern-input">
                        <label for="username" class="form-label fw-semibold">Username</label>
                        <div class="input-group">
                            <span class="input-group-text border-end-0"><i class="bi bi-person"></i></span>
                            <input type="text" class="form-control border-start-0" id="username" name="username" required placeholder="Enter your username">
                        </div>
                    </div>
                    <div class="mb-4 modern-input">
                        <label for="password" class="form-label fw-semibold">Password</label>
                        <div class="input-group">
                            <span class="input-group-text border-end-0"><i class="bi bi-lock"></i></span>
                            <input type="password" class="form-control border-start-0" id="password" name="password" required placeholder="Enter your password">
                        </div>
                    </div>
                    <button type="submit" class="btn modern-btn w-100 py-3 fw-bold shadow-sm rounded-3">Sign In</button>
                    
                    <div class="mt-4 text-center">
                        <p class="mb-0 text-muted">Don't have an account? <a href="{{ url_for('signup') }}" class="text-decoration-none fw-semibold">Sign Up</a></p>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
