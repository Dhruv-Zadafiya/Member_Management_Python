{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-0 rounded-4 mt-4">
            <div class="card-header bg-white border-bottom-0 pt-4 pb-0 text-center">
                <div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center mx-auto mb-3 shadow-sm" style="width: 80px; height: 80px; font-weight: 600; font-size: 2.5rem;">
                    {{ user.name[0]|upper if user.name else 'U' }}
                </div>
                <h4 class="fw-bold text-dark">Edit Profile</h4>
                <p class="text-muted">Manage your personal settings and password.</p>
            </div>
            <div class="card-body px-4 pb-4">
                <form action="{{ url_for('profile') }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-semibold text-muted">Username (Cannot be changed)</label>
                        <input type="text" class="form-control bg-light" value="@{{ user.username }}" disabled>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Role</label>
                        <input type="text" class="form-control bg-light text-capitalize" value="{{ user.get('role', 'User') }}" disabled>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">Full Name</label>
                        <input type="text" class="form-control" name="name" value="{{ user.name }}" required>
                    </div>
                    
                    <hr class="text-muted mb-4">
                    <h6 class="fw-bold mb-3"><i class="bi bi-shield-lock me-2 text-primary"></i>Change Password</h6>
                    
                    <div class="mb-4">
                        <label class="form-label fw-semibold">New Password</label>
                        <div class="input-group">
                            <input type="password" class="form-control border-end-0 password-field" name="password" placeholder="Leave blank to keep current password">
                            <button class="btn border-end border-top border-bottom bg-light toggle-password" type="button" style="border-color: #dee2e6; color: #495057;" title="Toggle Password Visibility">
                                <i class="bi bi-eye-slash"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary modern-btn py-2 fw-bold shadow-sm">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
